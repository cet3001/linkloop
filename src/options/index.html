<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkLoop Options</title>
    <style>
      :root {
        --bg: #101112;
        --surface: #1a1b1c;
        --border: #2d2e2f;
        --accent: #0070f3;
        --text: #ffffff;
        --text-muted: #a0a1a2;
      }
      body {
        max-width: 600px;
        margin: 40px auto;
        padding: 32px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        line-height: 1.5;
      }
      h1 {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 32px;
      }
      .section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 24px;
      }
      h2 {
        font-size: 16px;
        font-weight: 500;
        margin-top: 0;
        margin-bottom: 16px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .field {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
      }
      input, select {
        width: 100%;
        padding: 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text);
        font-size: 14px;
        box-sizing: border-box;
      }
      input:focus, select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(0, 112, 243, 0.2);
      }
      button {
        background: var(--accent);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #0061d5;
      }
      #status {
        margin-top: 16px;
        font-size: 14px;
        color: #10b981;
      }
    </style>
  </head>
  <body>
    <h1>LinkLoop Settings</h1>
    
    <div class="section">
      <h2>AI Intelligence</h2>
      <div class="field">
        <label for="service">Strategic Engine</label>
        <select id="service">
          <option value="openai">OpenAI (GPT-4o)</option>
          <option value="anthropic">Anthropic (Claude 3.5)</option>
        </select>
      </div>
      <div class="field">
        <label for="openaiKey">OpenAI API Key</label>
        <input type="password" id="openaiKey" placeholder="sk-...">
      </div>
      <div class="field">
        <label for="anthropicKey">Anthropic API Key</label>
        <input type="password" id="anthropicKey" placeholder="api-...">
      </div>
      <button id="save">Synchronize Configuration</button>
      <div id="status"></div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
